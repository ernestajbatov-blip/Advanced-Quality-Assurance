name: QA Tests - Assignment 1

on:
  push:
    branches: [qa/assignment-1-testing, main]
  pull_request:
    branches: [qa/assignment-1-testing, main]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
      
      - name: Check dependencies for vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies - Frontend
        run: npm install
      
      - name: Install dependencies - Backend
        run: cd src/backend && npm install
      
      - name: Run Unit Tests with Coverage
        run: npm run test:unit 2>/dev/null || echo "Unit tests not yet configured"
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        continue-on-error: true

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ada_oil_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies - Frontend
        run: npm install
      
      - name: Install dependencies - Backend
        run: cd src/backend && npm install
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Start Frontend (Vite)
        run: npm run dev > /tmp/vite.log 2>&1 &
        env:
          VITE_API_URL: http://localhost:5000/api
      
      - name: Start Backend (Express)
        run: cd src/backend && npm start > /tmp/backend.log 2>&1 &
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: ada_oil_test
          PORT: 5000
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for services..."
          timeout 60 bash -c 'until curl -f http://localhost:5000/api/health 2>/dev/null || [ $? -eq 7 ]; do sleep 1; done' || true
          timeout 60 bash -c 'until curl -f http://localhost:3000 2>/dev/null; do sleep 1; done'
          sleep 5
      
      - name: Run E2E Tests
        run: npx playwright test
        continue-on-error: true
        env:
          PLAYWRIGHT_HTML_REPORT: QA/test-reports/playwright
      
      - name: Collect backend logs
        if: always()
        run: |
          mkdir -p QA/test-reports/logs
          cp /tmp/vite.log QA/test-reports/logs/ || true
          cp /tmp/backend.log QA/test-reports/logs/ || true
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: QA/test-reports/
          retention-days: 30
      
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            QA/test-reports/**/*.xml
          check_name: E2E Test Results
        continue-on-error: true

  performance-audit:
    name: Performance Audit
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build for production
        run: npm run build
      
      - name: Install Lighthouse
        run: npm install -D lighthouse
      
      - name: Run Lighthouse audit
        run: |
          mkdir -p QA/test-reports/lighthouse
          npx lighthouse http://localhost:3000 \
            --output=html \
            --output-path=QA/test-reports/lighthouse/report.html || true
        continue-on-error: true
      
      - name: Upload performance reports
        uses: actions/upload-artifact@v4
        with:
          name: performance-audit
          path: QA/test-reports/lighthouse/
        continue-on-error: true

  generate-report:
    name: Generate Test Summary Report
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, performance-audit]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: QA/test-reports/artifacts
      
      - name: Create summary report
        run: |
          echo "# QA Test Execution Summary Report" > QA/test-reports/SUMMARY.md
          echo "" >> QA/test-reports/SUMMARY.md
          echo "**Date:** $(date)" >> QA/test-reports/SUMMARY.md
          echo "**Branch:** ${{ github.ref }}" >> QA/test-reports/SUMMARY.md
          echo "**Commit:** ${{ github.sha }}" >> QA/test-reports/SUMMARY.md
          echo "" >> QA/test-reports/SUMMARY.md
          echo "## Test Results" >> QA/test-reports/SUMMARY.md
          echo "- Lint: ${{ needs.lint.result }}" >> QA/test-reports/SUMMARY.md
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> QA/test-reports/SUMMARY.md
          echo "- E2E Tests: ${{ needs.integration-tests.result }}" >> QA/test-reports/SUMMARY.md
          echo "- Performance: ${{ needs.performance-audit.result }}" >> QA/test-reports/SUMMARY.md
      
      - name: Upload final summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: QA/test-reports/SUMMARY.md
      
      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('QA/test-reports/SUMMARY.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
